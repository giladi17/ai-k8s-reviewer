apiVersion: apps/v1
kind: Deployment
metadata:
  name: my-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: my-app
  template:
    metadata:
      labels:
        app: my-app
    spec:
      containers:
      - name: my-app-container
        image: nginx:latest
        # בעיה 1: אין הגבלת משאבים (resources limits) - הפוד יכול לחנוק את השרת של הקלאסטר
        # בעיה 2: משתמשים בתגית 'latest' - מתכון לאסון ולקריסות בגרסאות חדשות
        # בעיה 3: אין הגדרות הרשאות (securityContext)