apiVersion: apps/v1
kind: Deployment
metadata:
  name: wordface-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wordface-api
  template:
    metadata:
      labels:
        app: wordface-api
    spec:
      # כאן אנחנו אומרים לו להשתמש בסוד שיצרנו
      imagePullSecrets:
      - name: aws-registry
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: wordface-api-container
        # הכתובת של התמונה שלנו באמזון
        image: 066380525112.dkr.ecr.us-east-1.amazonaws.com/wordface-api:3.0
        ports:
        - containerPort: 8000
        securityContext:
          allowPrivilegeEscalation: false
        resources:
          requests:
            memory: "64Mi"
            cpu: "250m"
          limits:
            memory: "128Mi"
            cpu: "500m"